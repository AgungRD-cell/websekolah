<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Presentasi Digital</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;

    background:
    linear-gradient(rgba(0,0,0,0.5),
    rgba(0,0,0,0.5)),
    url('background.png');

    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    color:white;

    padding:40px;
}

.box{
    max-width:900px;

    margin:auto;

    background:rgba(255,255,255,0.12);

    backdrop-filter:blur(10px);

    padding:40px;

    border-radius:25px;
}

h1{
    text-align:center;
    margin-bottom:30px;
    color:yellow;
}

.foto{
    margin-bottom:40px;
}

.foto h2{
    margin-bottom:15px;
}

.foto img{
    width:100%;
    border-radius:15px;
}

.btn{
    display:inline-block;

    margin-top:20px;

    padding:12px 25px;

    background:#007bff;

    color:white;

    text-decoration:none;

    border-radius:10px;

    font-weight:bold;
}

.btn:hover{
    background:#0056b3;
}

.center{
    text-align:center;
}

</style>

</head>
<body>

<div class="box">

<h1>Presentasi Digital</h1>

<div class="foto">

<h2>Dokumentasi Pemberian Penghargaan dan Foto Bersama</h2>

<img src="1 (2).jpeg">
<img src="1 (3).jpeg">

</div>

<div class="foto">

<h2>Praktik Menulis Surat</h2>

<img src="IMG_20260513_113702.jpg">
<img src="IMG_20260513_113915.jpg">
<img src="IMG_20260513_114213.jpg">
<img src="IMG_20260513_114254.jpg">

</div>

<div class="foto">

<h2>Dokumentasi Kegiatan PKM </h2>

<img src="1 (5).jpeg">
<img src="1 (7).jpeg">
<img src="1 (9).jpeg">
<img src="1 (2)">
<img src="1 (2)">
<img src="1 (2)">

</div>

<div class="center">

<a href="PKM.html" class="btn">
    Kembali
</a>

</div>

</div>

</body>
</html>
