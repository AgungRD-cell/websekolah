<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Presentasi Digital</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;

    background:
    linear-gradient(rgba(0,0,0,0.5),
    rgba(0,0,0,0.5)),
    url('photo-collage.png.png');

    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    color:white;

    padding:40px;
}

.box{
    max-width:800px;

    margin:auto;

    background:rgba(255,255,255,0.12);

    backdrop-filter:blur(10px);

    -webkit-backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,0.2);

    padding:40px;

    border-radius:25px;

    box-shadow:0 8px 25px rgba(0,0,0,0.35);

    text-align:center;
}

h1{
    margin-bottom:25px;
    color:yellow;
}

p{
    line-height:1.9;
    margin-bottom:20px;
}

.btn{
    display:inline-block;

    margin-top:15px;

    padding:12px 25px;

    background:#007bff;

    color:white;

    text-decoration:none;

    border-radius:10px;

    font-weight:bold;

    transition:0.3s;
}

.btn:hover{
    background:#0056b3;
}

.slide{
    margin-top:30px;

    background:rgba(255,255,255,0.08);

    padding:25px;

    border-radius:20px;
}

</style>

</head>
<body>

<div class="box">

<h1>Presentasi Digital</h1>

<p>
Berikut adalah contoh presentasi digital
hasil karya siswa kelas 5.
</p>

<div class="slide">

<h2>Presentasi Teknologi</h2>

<p>
Tema:
Pemanfaatan Website Sebagai Media Pembelajaran
</p>

<a href="#" class="btn">
    Buka Presentasi
</a>

</div>

<br>

<a href="PKM.html" class="btn">
    Kembali
</a>

</div>

</body>
</html>
